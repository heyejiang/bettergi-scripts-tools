# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
name: Java Jar To Zip Publish
run-name: "[${{ (github.event_name == 'push' || ((inputs.push_to_docker_registry || inputs.push_to_github_release) == true)) && '正式版' || '测试版' }}] ${{ github.event.repository.name }} ${{ github.event.inputs.tag_name || github.ref_name || 'v-manual' }}  version"

permissions:
  contents: write          # 必须！允许创建/更新 Release + 上传 assets
  packages: write          # 如果你推送 Docker 镜像，也需要这个

on:
  push:
    branches:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '输入 Release 标签 (eg: v0.35.1, v0.36.5-alpha.1)'
        required: false
        type: string
        default: 'v-manual'
      skip_tests:
        description: '是否跳过测试 (true/false)'
        required: true
        type: boolean
        default: false
      java_version:
        description: '输入 Java 版本 (如 8, 11, 17)'
        required: true
        default: '8'
      jar_dir_prefix:
        description: 'JAR 文件前缀 (如 bgi-tools 或留空)'
        default: ''
      draft:
        description: '是否为草稿 Release (true/false)'
        type: boolean
        default: false
      prerelease:
        description: '是否为预发布 Release (true/false)'
        type: boolean
        default: false
      push_to_docker_registry:
        description: '是否推送到docker镜像仓库'
        required: true
        type: boolean
        default: false
      push_to_github_release:
        description: '是否推送到Github Release'
        required: true
        type: boolean
        default: false
      desc:
        description: 'Release 描述信息'
        required: false
        type: string
        default: ''
      icon_path:
        description: 'icon 图标'
        required: false
        type: string
        default: 'frontend/public/logo.ico'
      gitHub_release_text_path:
        description: 'Release 描述信息文件读取路径'
        required: false
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 在 Linux 上构建 JAR 并打包为 ZIP
  build-jar-linux:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.set_vars.outputs.tag_name }}
      java_version: ${{ steps.set_vars.outputs.java_version }}
      jar_dir_prefix: ${{ steps.set_vars.outputs.jar_dir_prefix }}
      push_to_docker_registry: ${{ steps.set_vars.outputs.push_to_docker_registry }}
      push_to_github_release: ${{ steps.set_vars.outputs.push_to_github_release }}
    permissions:
      contents: write
      actions: read
    steps:
      - name: 1. 调试触发信息
        run: |
          echo "事件类型: ${{ github.event_name }}"
          echo "引用: ${{ github.ref }}"
          echo "标签名: ${{ github.event.inputs.tag_name || github.ref_name }}"
          echo "跳过测试: ${{ github.event.inputs.skip_tests || true }}"
          echo "Java 版本: ${{ github.event.inputs.java_version || secrets.JAVA_VERSION || '8' }}"
          echo "JAR 前缀: ${{ github.event.inputs.jar_dir_prefix || 'bgi-tools' }}"
          echo "草稿: ${{ github.event.inputs.draft || false }}"
          echo "预发布: ${{ github.event.inputs.prerelease || false }}"
          echo "仓库: ${{ github.repository }}"
          echo "提交 SHA: ${{ github.sha }}"

      - name: 2. 检出代码
        uses: actions/checkout@v4

      - name: 3. 设置输入参数和环境变量
        id: set_vars
        run: |
          # 初始化默认值
          TAG_NAME="${{ github.event.inputs.tag_name || github.ref_name || 'v-manual' }}"

          # 处理布尔值（inputs 为字符串，需要转换）
          SKIP_TESTS="${{ inputs.skip_tests || 'false' }}"
          if [[ "$SKIP_TESTS" == "true" || "$SKIP_TESTS" == "1" ]]; then
            SKIP_TESTS=true
          else
            SKIP_TESTS=false
          fi

          JAVA_VERSION="${{ inputs.java_version || secrets.JAVA_VERSION || '8' }}"
          JAR_DIR_PREFIX="${{ inputs.jar_dir_prefix || 'bgi-tools' }}"
          DRAFT="${{ inputs.draft || 'false' }}"
          PRERELEASE="${{ inputs.prerelease || 'false' }}"

          EVENT_NAME="${{ github.event_name }}"

          # 默认值
          AUTO=false
          PUSH_TO_DOCKER_REGISTRY=false
          PUSH_TO_GITHUB_RELEASE=false

          # 核心判断：自动发布或手动发布
          if [[ "$EVENT_NAME" == "push" ]] && [[ "$TAG_NAME" == v* ]]; then
            AUTO=true
            PUSH_TO_DOCKER_REGISTRY=true
            PUSH_TO_GITHUB_RELEASE=true
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            [[ "${{ inputs.push_to_docker_registry }}" == "true" ]] && PUSH_TO_DOCKER_REGISTRY=true
            [[ "${{ inputs.push_to_github_release }}" == "true" ]] && PUSH_TO_GITHUB_RELEASE=true
          fi

          # 写入环境变量
          echo "AUTO=$AUTO" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "SKIP_TESTS=$SKIP_TESTS" >> $GITHUB_ENV
          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_ENV
          echo "JAR_DIR_PREFIX=$JAR_DIR_PREFIX" >> $GITHUB_ENV
          echo "DRAFT=$DRAFT" >> $GITHUB_ENV
          echo "PRERELEASE=$PRERELEASE" >> $GITHUB_ENV
          echo "PUSH_TO_DOCKER_REGISTRY=$PUSH_TO_DOCKER_REGISTRY" >> $GITHUB_ENV
          echo "PUSH_TO_GITHUB_RELEASE=$PUSH_TO_GITHUB_RELEASE" >> $GITHUB_ENV

          # 设置 job 输出
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "java_version=$JAVA_VERSION" >> $GITHUB_OUTPUT
          echo "jar_dir_prefix=$JAR_DIR_PREFIX" >> $GITHUB_OUTPUT
          echo "push_to_docker_registry=$PUSH_TO_DOCKER_REGISTRY" >> $GITHUB_OUTPUT
          echo "push_to_github_release=$PUSH_TO_GITHUB_RELEASE" >> $GITHUB_OUTPUT

          echo "═══════════════════════════════════════════"
          echo "最终设置值："
          echo "  AUTO                   : $AUTO"
          echo "  TAG_NAME               : $TAG_NAME"
          echo "  SKIP_TESTS             : $SKIP_TESTS"
          echo "  JAVA_VERSION           : $JAVA_VERSION"
          echo "  JAR_DIR_PREFIX         : $JAR_DIR_PREFIX"
          echo "  DRAFT                  : $DRAFT"
          echo "  PRERELEASE             : $PRERELEASE"
          echo "  PUSH_TO_DOCKER_REGISTRY: $PUSH_TO_DOCKER_REGISTRY"
          echo "  PUSH_TO_GITHUB_RELEASE : $PUSH_TO_GITHUB_RELEASE"
          echo "═══════════════════════════════════════════"

      - name: 4. 验证版本号格式
        run: |
          echo "当前版本号: $TAG_NAME"
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "❌ 错误：版本格式必须符合 SemVer 规范"
            exit 1
          fi
          echo "版本号验证通过"

      - name: 5. 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 6. 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 7. 使用 Maven 构建项目
        run: |
          if [ "${{ env.SKIP_TESTS }}" = "true" ]; then
            echo "跳过测试"
            mvn clean package -B -DskipTests -Dquickly
          else
            mvn clean package -B -Dquickly
          fi

      - name: 8.列出匹配的 JAR 文件
        run: |
          if [ "${{ env.JAR_DIR_PREFIX  }}" = "" ]; then
            echo "匹配的 JAR 文件 (*/target/*.jar):"
            find . -type f -path "*/target/*.jar" || echo "未找到匹配的 JAR 文件"
          else
            echo "匹配的 JAR 文件 (*/${{ env.JAR_DIR_PREFIX  }}/*/target/*.jar,*/${{ env.JAR_DIR_PREFIX  }}/target/*.jar):"
            find . -type f \( -path "*/${{ env.JAR_DIR_PREFIX }}/*/target/*.jar" -o -path "*/${{ env.JAR_DIR_PREFIX }}/target/*.jar" \)|| echo "未找到匹配的 JAR 文件"
          fi

      - name: 9.重命名 JAR 文件（移除版本号）
        run: |
          echo "开始重命名 JAR 文件，移除版本号..."
          
          # 创建临时目录存储重命名后的文件
          mkdir -p /tmp/renamed-jars
          
          # 根据 JAR_DIR_PREFIX 查找并重命名 JAR 文件
          if [ "${{ env.JAR_DIR_PREFIX }}" = "" ]; then
            echo "查找匹配的 JAR 文件 (*/target/*.jar):"
            find . -type f -path "*/target/*.jar" -exec bash -c '
              for jar_file; do
                if [ -f "$jar_file" ]; then
                  # 获取不带扩展名的文件名
                  base_name=$(basename "$jar_file" .jar)
                  
                  # 使用正则表达式移除版本号
                  # 匹配模式：-v1.2.3, -1.2.3, -v1.2.3-beta.1 等版本格式
                  new_name=$(echo "$base_name" | sed -E "s/-v?[0-9]+(\.[0-9]+)*(-[a-zA-Z0-9]+)*$//")
                  
                  # 构造新的文件路径
                  new_path="/tmp/renamed-jars/${new_name}.jar"
                  
                  # 如果名称发生了变化，则复制并重命名文件
                  if [ "$base_name" != "$new_name" ]; then
                    echo "重命名: $jar_file -> $new_path"
                    cp "$jar_file" "$new_path"
                  else
                    echo "保持原名: $jar_file -> $new_path"
                    cp "$jar_file" "$new_path"
                  fi
                fi
              done
            ' _ {} +
          else
            echo "查找匹配的 JAR 文件 (*/${{ env.JAR_DIR_PREFIX }}/*/target/*.jar, */${{ env.JAR_DIR_PREFIX }}/target/*.jar):"
            find . -type f \( -path "*/${{ env.JAR_DIR_PREFIX }}/*/target/*.jar" -o -path "*/${{ env.JAR_DIR_PREFIX }}/target/*.jar" \) -exec bash -c '
              for jar_file; do
                if [ -f "$jar_file" ]; then
                  # 获取不带扩展名的文件名
                  base_name=$(basename "$jar_file" .jar)
                  
                  # 使用正则表达式移除版本号
                  new_name=$(echo "$base_name" | sed -E "s/-v?[0-9]+(\.[0-9]+)*(-[a-zA-Z0-9]+)*$//")
                  
                  # 构造新的文件路径
                  new_path="/tmp/renamed-jars/${new_name}.jar"
                  
                  # 复制并可能重命名文件
                  if [ "$base_name" != "$new_name" ]; then
                    echo "重命名: $jar_file -> $new_path"
                    cp "$jar_file" "$new_path"
                  else
                    echo "保持原名: $jar_file -> $new_path"
                    cp "$jar_file" "$new_path"
                  fi
                fi
              done
            ' _ {} +
          fi
          
          echo "重命名完成后的文件:"
          ls -la /tmp/renamed-jars

      - name: 10.打包所有 JAR 文件成 ZIP
        run: |
          # 从重命名后的目录打包文件（不使用cd）
          zip -j jars.zip /tmp/renamed-jars/*.jar
          # -j: 仅打包文件，不保留目录结构
          echo "打包完成，ZIP文件内容:"
          unzip -l jars.zip
        shell: bash

#      - name: 9.打包所有 JAR 文件成 ZIP
#        run: |
#          if [ "${{ env.JAR_DIR_PREFIX }}" = "" ]; then
#            find . -type f -path "*/target/*.jar" -exec zip -j jars.zip {} +
#          else
#            find . -type f \( -path "*/${{ env.JAR_DIR_PREFIX }}/*/target/*.jar" -o -path "*/${{ env.JAR_DIR_PREFIX }}/target/*.jar" \) -exec zip -j jars.zip {} +
#          fi
#          # -j: 仅打包文件，不保留目录结构
#          # +: 尽量将多个文件放入一个 zip 命令，减少调用次数
#        shell: bash
#
#      - name: 10. 验证 JAR ZIP 文件
#        run: |
#          ls -la jars.zip
#          unzip -l jars.zip
#

      - name: 11.解压 ZIP 文件
        run: |
          mkdir -p /tmp/extracted-jars
          unzip jars.zip -d /tmp/extracted-jars
          echo "解压后的文件:"
          ls -la /tmp/extracted-jars

      - name: 12. 上传 JAR ZIP 供 Windows 使用
        uses: actions/upload-artifact@v4
        with:
          name: jars-zip
          path: jars.zip

      - name: 13. 上传单个 JAR 文件
        uses: actions/upload-artifact@v4
        with:
          name: jar-files
          path: /tmp/extracted-jars/*.jar

  # 新 Job: 在 Linux 上生成 Windows EXE（使用 Wine + MinGW）
  build-exe:
    runs-on: ubuntu-latest
    needs: build-jar-linux
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ needs.build-jar-linux.outputs.tag_name }}
      JAVA_VERSION: ${{ needs.build-jar-linux.outputs.java_version }}
      ICON_PATH: ${{ github.event.inputs.icon_path || 'frontend/public/logo.ico' }}
    steps:
      - name: 1. 检出代码（用于图标和可能需要的资源）
        uses: actions/checkout@v4

      - name: 2. 下载 JAR ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: jars-zip
          path: ./

      - name: 3. 解压 JAR 到 /tmp/extracted-jars
        run: |
          mkdir -p /tmp/extracted-jars
          unzip "jars.zip" -d /tmp/extracted-jars
          ls -la /tmp/extracted-jars

      - name: 4. 安装 Wine 和 MinGW 工具链（cross-compile Windows exe）
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -y
          sudo apt-get install -y \
            wine-stable wine32 \
            mingw-w64 binutils-mingw-w64-i686 gcc-mingw-w64-i686 g++-mingw-w64-i686 \
            jq unzip curl wget zip

      - name: 5. 下载并配置 Launch4j（Linux 版）
        run: |
          wget -O launch4j.tgz "https://sourceforge.net/projects/launch4j/files/launch4j-3/3.50/launch4j-3.50-linux-x64.tgz/download"
          #https://onboardcloud.dl.sourceforge.net/project/launch4j/launch4j-3/3.50/launch4j-3.50-linux-x64.tgz?viasf=1
          tar -xzf launch4j.tgz -C /tmp
          chmod +x /tmp/launch4j/launch4j

          # 强制使用系统 windres/ld（避免 launch4j 自带工具问题）
          mkdir -p /tmp/launch4j/bin
          ln -sf /usr/bin/i686-w64-mingw32-windres /tmp/launch4j/bin/windres
          ln -sf /usr/bin/i686-w64-mingw32-ld     /tmp/launch4j/bin/ld
          ln -sf /usr/bin/i686-w64-mingw32-ar     /tmp/launch4j/bin/ar

          # 测试
          /tmp/launch4j/bin/windres --version || exit 1
          echo "/tmp/launch4j/ 文件："
          ls -lh /tmp/launch4j/ || echo "没有文件"

      - name: 6. 下载 Windows JRE 并捆绑（2026 年兼容版）
        run: |
          API_URL="https://api.adoptium.net/v3/assets/latest/${{ env.JAVA_VERSION }}/hotspot?image_type=jdk&os=windows&arch=x64&vendor=adoptium"

          echo "请求 API: $API_URL"

          RESPONSE=$(curl -s --fail -L "$API_URL" || { echo "API 请求失败"; exit 1; })

          # 打印响应预览（调试）
          echo "API 响应前 15 行："
          echo "$RESPONSE" | head -n 15

          # 优先提取 x64 的 package.link（新格式）
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '
            if type == "array" then 
              .[] | select(.binary.architecture == "x64") | .binary.package.link 
            else 
              .binary.package.link // empty 
            end // .[0].binary.package.link // empty
          ')

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ 无法提取下载链接"
            echo "完整响应："
            echo "$RESPONSE" | jq . || echo "$RESPONSE"
            exit 1
          fi

          echo "提取到下载链接：$DOWNLOAD_URL"

          wget -O jdk.zip "$DOWNLOAD_URL" || { echo "下载失败"; exit 1; }

          unzip -q jdk.zip -d jdk_extract || exit 1

          JDK_ROOT=$(find jdk_extract -mindepth 1 -maxdepth 1 -type d | head -1)
          [ -z "$JDK_ROOT" ] && { echo "未找到 JDK 根目录"; ls -la jdk_extract; exit 1; }

          mkdir -p /tmp/extracted-jars/jre

          if [[ "${{ env.JAVA_VERSION }}" == "8" ]]; then
            if [ -d "$JDK_ROOT/jre" ]; then
              cp -r "$JDK_ROOT/jre/"* /tmp/extracted-jars/jre/
            else
              echo "JDK8 无 jre 子目录，使用整个 JDK 作为运行时"
              cp -r "$JDK_ROOT/"* /tmp/extracted-jars/jre/
            fi
          else
            cp -r "$JDK_ROOT/"* /tmp/extracted-jars/jre/
          fi

          echo "捆绑 JRE 大小："
          du -sh /tmp/extracted-jars/jre

          rm -rf jdk.zip jdk_extract      

      - name: 7. 为每个 JAR 生成 Windows EXE
        run: |
          echo "当前工作目录：$(pwd)"
          ls -la /tmp/extracted-jars || echo "/tmp/extracted-jars 目录不存在"

          # 创建独立的 exe 输出目录
          mkdir -p /tmp/extracted-exes
          echo "exe 输出目录：/tmp/extracted-exes"
          ls -la /tmp/extracted-exes || true

          for jar in /tmp/extracted-jars/*.jar; do
            [ -f "$jar" ] || { echo "没有找到任何 JAR 文件，跳过"; continue; }

            jar_name=$(basename "$jar" .jar)
            # 使用正则表达式去除版本号部分（匹配数字、点号、连字符组成的版本号）
            # 统一处理版本号（优先匹配带v前缀的，再匹配不带v前缀的）
            jar_name=$(echo "$jar_name" | sed -E 's/-v?[0-9]+(\.[0-9]+)*(-[a-zA-Z0-9]+)*$//')

            exe_file="/tmp/extracted-exes/${jar_name}.exe"   # 统一放到 /tmp/extracted-exes

            echo "======================================"
            echo "处理 JAR: $jar"
            echo "输出 EXE: $exe_file"

            # 提取 Main-Class
            main_class=$(unzip -p "$jar" META-INF/MANIFEST.MF | grep '^Main-Class:' | sed 's/^Main-Class: *//' | tr -d '\r')
            if [ -z "$main_class" ]; then
              echo "跳过无 Main-Class 的 $jar"
              continue
            fi
            echo "Main-Class: $main_class"

            # 版本处理
            raw_tag="${TAG_NAME#v}"
            clean_ver=$(echo "$raw_tag" | sed 's/[^0-9.]//g' | sed 's/\.\.*/./g')
            IFS='.' read -r major minor patch build <<< "$clean_ver"
            file_ver="${major:-0}.${minor:-0}.${patch:-0}.${build:-0}"
            echo "File Version: $file_ver"

            # icon 路径（使用相对路径）
            icon_path="${ICON_PATH}"
            if [ ! -f "$icon_path" ]; then
              echo "警告：图标文件 $icon_path 不存在，将不使用图标"
              icon_path=""
            else
              echo "使用图标：$icon_path"
            fi

            # 生成 XML 配置（outfile 使用相对路径）
            config="/tmp/${jar_name}_config.xml"
            cat > "$config" << EOF
          <launch4jConfig>
            <dontWrapJar>false</dontWrapJar>
            <headerType>console</headerType>
            <jar>$(realpath "$jar")</jar>
            <outfile>$exe_file</outfile>
            <errTitle>${{ github.event.repository.name }} Error</errTitle>
            <classPath><mainClass>$main_class</mainClass></classPath>
            <jre>
              <path>jre;%JAVA_HOME%;%PATH%</path>
              <minVersion>${{ env.JAVA_VERSION }}.0</minVersion>
              <maxVersion>${{ env.JAVA_VERSION }}.999</maxVersion>
              <jdkPreference>preferBundled</jdkPreference>
            </jre>
            <versionInfo>
              <fileVersion>$file_ver</fileVersion>
              <txtFileVersion>${TAG_NAME}</txtFileVersion>
              <productVersion>$file_ver</productVersion>
              <txtProductVersion>${TAG_NAME}</txtProductVersion>
              <fileDescription>${{ github.event.repository.name }} Standalone</fileDescription>
              <copyright>Copyright (c) 2023-$(date +%Y)</copyright>
              <productName>${{ github.event.repository.name }}</productName>
              <internalName>$jar_name</internalName>
              <originalFilename>$jar_name.exe</originalFilename>
            </versionInfo>
            <icon>${{ github.workspace }}/${{ env.ICON_PATH }}</icon>
          </launch4jConfig>
          EOF

            echo "生成的 XML 配置（预览）："
            cat "$config"

            # 执行 launch4j
            java -Djava.awt.headless=true -jar /tmp/launch4j/launch4j.jar "$config" || { 
              echo "Launch4j 执行失败"
              cat /tmp/launch4j.log 2>/dev/null || echo "无 launch4j 日志"
              exit 1
            }

            # 检查结果
            if [ -f "$exe_file" ]; then
              echo "生成成功: $exe_file"
              ls -lh "$exe_file"
            else
              echo "生成失败: $exe_file 不存在"
              ls -la /tmp/extracted-exes || echo "/tmp/extracted-exes 目录为空"
              exit 1
            fi
          done

          # 步骤结束时预览所有 exe
          echo "所有生成的 exe 文件："
          ls -lh /tmp/extracted-exes || echo "没有生成任何 exe"

      - name: 8. 打包独立运行包（EXE + JRE + 配置文件）
        run: |
          echo "当前工作目录：$(pwd)"
          ls -la /tmp/extracted-jars /tmp/extracted-exes || echo "目录检查"

          # 创建最终打包目录
          mkdir -p bgi-tools

          # 拷贝所有 exe 到打包目录根目录
          echo "拷贝 exe 文件..."
          cp /tmp/extracted-exes/*.exe bgi-tools/ 2>/dev/null || echo "警告：没有找到 exe 文件"

          # 创建 jre 子目录，并从 /tmp/extracted-jars/jre 拷贝过来
          echo "拷贝 JRE 到 /tmp/extracted-exes/jre → bgi-tools/jre"
          mkdir -p /tmp/extracted-exes/jre
          cp -r /tmp/extracted-jars/jre/* /tmp/extracted-exes/jre/ 2>/dev/null || echo "警告：JRE 拷贝失败（可能 jre 不存在）"
          
          # 再把 /tmp/extracted-exes/jre 拷贝到打包目录
          cp -r /tmp/extracted-exes/jre bgi-tools/ 2>/dev/null || echo "警告：最终 jre 拷贝失败"

          # 配置文件
          if [ -f src/main/resources/application-prod.yml ]; then
            cp src/main/resources/application-prod.yml bgi-tools/
            echo "已拷贝 application-prod.yml"
          else
            cat > bgi-tools/application-prod.yml << 'EOF'
          server:
            port: 8081
          ws:
            url: ws://localhost:8081/ws
            access-token-name: access-token
          EOF
            echo "使用默认配置文件"
          fi

          # 预览打包内容
          echo "bgi-tools 最终内容预览："
          tree bgi-tools || ls -R bgi-tools

          # 执行打包
          ZIP_NAME="${{ github.event.repository.name }}-Windows.zip"
          echo "开始创建 ZIP 包: $ZIP_NAME"
          
          if zip -r "$ZIP_NAME" bgi-tools/*; then
            echo "✅ 打包成功"
          
            # 验证打包结果
            if [ -f "$ZIP_NAME" ]; then
              echo "ZIP 文件信息："
              ls -lh "$ZIP_NAME"
              du -sh "$ZIP_NAME"
              unzip -l "$ZIP_NAME" | head -20
            else
              echo "❌ 打包文件未生成"
              exit 1
            fi
          else
            echo "❌ 打包过程出错"
            exit 1
          fi
          
          echo "=== 打包完成 ==="

      - name: 上传所有生成的 EXE 和 JRE（调试用）
        uses: actions/upload-artifact@v4
        with:
          name: windows-exes-and-jre
          path: /tmp/extracted-exes/

      - name: 9. 上传独立运行包
        uses: actions/upload-artifact@v4
        with:
          name: windows-standalone
          path: ${{ github.event.repository.name }}-Windows.zip

      - name: 10. 上传单个 EXE（可选）
        uses: actions/upload-artifact@v4
        with:
          name: windows-exes
          path: /tmp/extracted-exes/*.exe


  build-and-push-docker:
    runs-on: ubuntu-latest
    needs: build-jar-linux  # 添加依赖关系
    permissions:
      contents: read
      packages: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 下载之前工作流的构建产物
      - name: Download JAR artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-files
          path: ./

      - name: List downloaded files
        run: ls -la ./

      - name: 配置
        run: |
          DOCKER_FILE_NAME="Dockerfile"
          if [ -f "$DOCKER_FILE_NAME" ]; then
              echo "$DOCKER_FILE_NAME already exists"
              cat "$DOCKER_FILE_NAME"
          else
              cat > "$DOCKER_FILE_NAME" << EOF
              FROM eclipse-temurin:${{ needs.build-jar-linux.outputs.java_version }}-jre-alpine
              VOLUME /tmp
              WORKDIR /app
              COPY *.jar app.jar
              ENTRYPOINT ["java","-jar","app.jar"]
          EOF
              if [ -f "$DOCKER_FILE_NAME" ]; then
                echo "$DOCKER_FILE_NAME created successfully"
                cat "$DOCKER_FILE_NAME"
              else
              echo "Error: $DOCKER_FILE_NAME creation failed"
              exit 1
              fi
          fi          
          
          echo "DOCKER_FILE_NAME=$DOCKER_FILE_NAME" >> $GITHUB_ENV

      # 设置 Docker Buildx
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 登录到 GitHub Container Registry
      - name: 登录 Log in to Container Registry
        if: ${{ needs.build-jar-linux.outputs.push_to_docker_registry == 'true' }}
        #if: ${{ github.event_name == 'push' || inputs.push_to_docker_registry == true }}
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取 Docker 镜像元数据
      - name: 提取 Docker 镜像元数据
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.build-jar-linux.outputs.tag_name||github.ref_name }}
            type=raw,value=latest
      

      # 构建并推送 Docker 镜像
      - name: 构建并推送 Docker image
        uses: docker/build-push-action@v4
        #if: ${{ needs.build-jar-linux.outputs.push_to_docker_registry == 'true' }}
        #if: ${{ github.event_name == 'push' || inputs.push_to_docker_registry == true }}
        with:
          context: .
          file: ./${{ env.DOCKER_FILE_NAME}}
          push: ${{ needs.build-jar-linux.outputs.push_to_docker_registry == 'true' }}
          #push: ${{ github.event_name == 'push' || inputs.push_to_docker_registry == true }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAVA_VERSION=${{needs.build-jar-linux.outputs.java_version}}
            JAR_FILE_PATH=./*.jar

      # 验证构建的镜像
      - name: 验证构建 Docker image
        run: |
          docker images
          #if [ "${{ github.event_name == 'push' || inputs.push_to_docker_registry == true }}" ]; then
          if [ "${{ needs.build-jar-linux.outputs.push_to_docker_registry == 'true' }}" ]; then
            echo "Docker image pushed successfully"
          else
            echo "Docker image built locally only"
          fi
      

      # ============ 新增：保存并上传 Docker 镜像 ============
      - name: 保存 Docker 镜像为 tar 文件
        run: |
          # 取得第一个 tag（通常是最主要的那个）
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "正在保存的镜像标签: $IMAGE_TAG"

          # 使用最安全的文件名策略：版本号 + 时间戳
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAR_FILE_NAME="docker-${{ needs.build-jar-linux.outputs.tag_name }}-${TIMESTAMP}.tar"

          echo "最终安全文件名: $TAR_FILE_NAME"

          # 检查镜像是否存在
          if ! docker image inspect "$IMAGE_TAG" >/dev/null 2>&1; then
            echo "❌ 镜像 $IMAGE_TAG 不存在！当前本地镜像列表："
            docker images
            exit 1
          fi

          # 保存镜像
          docker save "$IMAGE_TAG" -o "$TAR_FILE_NAME"

          # 记录给下一步使用
          echo "TAR_FILE_NAME=$TAR_FILE_NAME" >> $GITHUB_ENV

      # 创建使用说明 Markdown 文件
      - name: 创建 Docker 使用说明文档 (README-Docker-Usage.md)
        run: |
          cat <<EOF > README-Docker-Usage.md
          # ${{ github.event.repository.name }} Docker 镜像使用说明

          **当前镜像版本**：${{ needs.build-jar-linux.outputs.tag_name}}  
          **构建时间**：$(date '+%Y年%m月%d日 %H:%M:%S') (HKT)  
          **镜像标签示例**：ghcr.io/${{ github.event.repository.name}}:${{ needs.build-jar-linux.outputs.tag_name }} 或 :latest

          这是一个**完整的 Docker 镜像导出包**（.tar 文件），包含 ${{ github.event.repository.name }} 应用及运行环境。  
          支持完全离线部署，无需联网拉取镜像，非常适合内网服务器、测试机或快速分发。

          ## 1. 导入镜像

          在任何安装了 Docker 的机器上，直接运行以下命令：

          \`\`\`bash
          # 使用 workflow 生成的精确文件名导入镜像
          docker load -i $TAR_FILE_NAME

          # 成功后会显示类似：
          # Loaded image: ghcr.io/${{ github.event.repository.name }}:${{ needs.build-jar-linux.outputs.tag_name }}
          # Loaded image: ghcr.io/${{ github.event.repository.name }}:latest
          \`\`\`

          \`\`\`bash
          # 查看已导入的镜像
          docker images | grep ${{ github.event.repository.name }}
          \`\`\`

          ## 2. 启动容器（推荐方式）

          \`\`\`bash
          docker run -d \\
            --name ${{ github.event.repository.name }}\\
            -p 8081:8081 \\
            -v \$(pwd)/${{ github.event.repository.name }}:/app \\           # 可选：挂载配置文件目录
            --restart unless-stopped \\
            ghcr.io/${{ github.event.repository.name }}:${{needs.build-jar-linux.outputs.tag_name }}
          \`\`\`

          - **默认端口**：8081（可在 application-prod.yml 中修改）  
          - **访问地址**：http://你的服务器IP:8081/bgi  
          - **配置文件挂载建议**：  
            在当前目录创建 config 文件夹，将 application-prod.yml 放入其中

          ## 3. 常用命令速查

          \`\`\`bash
          # 查看实时日志
          docker logs -f ${{ github.event.repository.name }}

          # 进入容器内部（调试用）
          docker exec -it ${{ github.event.repository.name }} /bin/sh

          # 停止并删除容器
          docker stop ${{ github.event.repository.name }} && docker rm ${{ github.event.repository.name }}
          \`\`\`

          ## 4. 注意事项

          - 需要 Docker 20.10 或更高版本
          - 当前镜像平台：linux/amd64（适用于大多数服务器和 PC）
          - 如遇端口冲突、网络问题，请检查：
            - 防火墙设置
            - 端口映射是否正确
            - 是否有其他程序占用 8081 端口
          - 问题反馈：欢迎在 GitHub Issues 留言

          **祝使用愉快！**  
          文档由 GitHub Actions 自动生成于构建 ${{ github.run_id }}
          EOF

          # 调试输出：确认文件名已正确展开
          echo "使用的 TAR_FILE_NAME 值：$TAR_FILE_NAME"
          echo "生成的 Markdown 文件内容预览："
          cat README-Docker-Usage.md      

      - name: 上传 Docker 镜像 tar 文件为 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-artifact
          path: |
            ${{ env.TAR_FILE_NAME }}
            README-Docker-Usage.md
          # retention-days: 5 # 设置保留天数为5天


  # 发布到 GitHub Release
  push-release:
    runs-on: ubuntu-latest
    needs: [ build-jar-linux, build-exe ]
    if: ${{ needs.build-jar-linux.outputs.push_to_github_release == 'true' }}
    steps:
      - name: 1. 设置发布信息
        run: |
          echo "当前工作目录：$(pwd)"
          echo "🚀 发布到 GitHub Release"
      
          # 初始化默认值
          DESC="${{ github.event.inputs.desc || '' }}"
          GitHub_Release_Text_Path="${{ github.event.inputs.gitHub_release_text_path || 'GitHub_Release.txt' }}"
      
          # 构造文件路径（使用正确的仓库路径）
          GitHub_Release_Path="${{ github.workspace }}/$GitHub_Release_Text_Path"
      
          # 读取文件内容并处理
          if [ -f "$GitHub_Release_Path" ]; then
            GitHub_Release=$(cat "$GitHub_Release_Path")
            echo "✅ 成功读取文件内容：$GitHub_Release_Path"
          else
            GitHub_Release=""
            echo "⚠️ 文件未找到，使用默认内容：$GitHub_Release"
          fi
      
          # 根据 DESC 是否为空决定是否覆盖
          if [ -n "$DESC" ]; then
            echo "DESC 已设置为自定义值：$DESC"
          else
            DESC="$GitHub_Release"
            echo "DESC 未设置，使用文件内容：$DESC"
          fi
      
          # 写入环境变量
          echo "DESC=$DESC" >> $GITHUB_ENV
          echo "GITHUB_RELEASE=$GitHub_Release" >> $GITHUB_ENV
      
          echo "═══════════════════════════════════════════"
          echo "最终设置值："
          echo "  DESC           : $DESC"
          echo "  GITHUB_RELEASE : $GitHub_Release"
          echo "  tag_name : ${{ needs.build-jar-linux.outputs.tag_name }}"
          echo "═══════════════════════════════════════════"


      - name: 2. 下载所有 artifact
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: ${{ github.workspace }}/artifacts/
          #merge-multiple: true

      - name: 3. 检查 artifact
        run: |
          echo "当前工作目录：$(pwd)"
          echo "🚀 检查 ${{ github.workspace }}/artifacts"
          echo "${{ github.workspace }}/artifacts 最终内容预览："
          tree ${{ github.workspace }}/artifacts || ls -R ${{ github.workspace }}/artifacts

      - name: 4. 创建 Release 并上传文件
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-jar-linux.outputs.tag_name }}
          name: ${{ needs.build-jar-linux.outputs.tag_name }}
          files: |
            ${{ github.workspace }}/artifacts/jars-zip/*.zip
            ${{ github.workspace }}/artifacts/jar-files/*.jar
            ${{ github.workspace }}/artifacts/windows-exes/*.exe
            ${{ github.workspace }}/artifacts/windows-standalone/*.zip
          body: |
            **下载地址**
             https://github.com/${{ github.repository }}/releases/tag/${{ needs.build-jar-linux.outputs.tag_name }}
            **发布信息**
            - 标签：${{ needs.build-jar-linux.outputs.tag_name }}
            - Java 版本：${{ needs.build-jar-linux.outputs.java_version }}
            
            ### 🏆 推荐下载（完全独立运行，无需安装 Java）
            ${{ github.event.repository.name }}-Windows.zip  
            → 解压后直接双击 .exe 运行
            
            ### 📦 其他文件
            - jars-*.zip：原始 JAR 包
            - 单个 .jar / .exe
      
            ${{ env.DESC }}
            
            **系统要求**：Windows 10/11 x64  
            **运行方式**：推荐使用独立包，双击即跑
           
            如有问题欢迎反馈！
          draft: ${{ github.event.inputs.draft || false }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
