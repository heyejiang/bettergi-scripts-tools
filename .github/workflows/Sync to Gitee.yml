name: Sync to Gitee

on:
  # push:  # 如需 push 触发可取消注释
  #   branches:
  #     - master
  #   tags:
  #     - '**'
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00（北京时间 08:00）

  workflow_dispatch:
    inputs:
      force_push:
        description: '强制推送（跳过检查）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出完整历史记录
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 用户信息
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: 检查是否为强制推送模式
        id: force_mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_push }}" == "true" ]]; then
            echo "🔥 强制推送模式已启用（跳过检查）"
            echo "force_mode=true" >> $GITHUB_OUTPUT
          else
            echo "✅ 正常同步模式（执行检查）"
            echo "force_mode=false" >> $GITHUB_OUTPUT
          fi

      - name: 检查是否有变更需要同步
        id: check_changes
        if: steps.force_mode.outputs.force_mode == 'false'
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "🔍 检查 GitHub 与 Gitee 的差异..."
          
          LOCAL_SHA=$(git rev-parse HEAD)
          echo "本地最新提交：$LOCAL_SHA"
          
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/bettergi-scripts-tools.git"
          
          if GITEE_SHA=$(git ls-remote "$GITEE_URL" master 2>/dev/null | awk '{print $1}'); then
            if [ -n "$GITEE_SHA" ]; then
              echo "Gitee 最新提交：$GITEE_SHA"
              if [ "$LOCAL_SHA" = "$GITEE_SHA" ]; then
                echo "✅ 无需同步，Gitee 已是最新"
                echo "has_changes=false" >> $GITHUB_OUTPUT
                exit 0
              else
                echo "⚠️ 检测到差异，需要同步"
                echo "has_changes=true" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi
          fi
          
          echo "⚠️ 无法访问 Gitee 仓库（可能是首次同步或权限问题）"
          echo "将执行完整同步"
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: 设置同步标志（强制模式）
        if: steps.force_mode.outputs.force_mode == 'true'
        run: |
          echo "🔥 强制推送模式：直接执行同步"
          echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: 跳过同步（无变更）
        if: steps.check_changes.outputs.has_changes == 'false' && steps.force_mode.outputs.force_mode != 'true'
        run: |
          echo "⏭️ 跳过本次同步任务"
          echo "原因：Gitee 与 GitHub 保持一致"

      - name: 推送分支和标签到 Gitee
        if: steps.check_changes.outputs.has_changes == 'true' || steps.force_mode.outputs.force_mode == 'true'
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          mode_text=""
          [[ "${{ steps.force_mode.outputs.force_mode }}" == "true" ]] && mode_text="[强制推送模式] "
          
          echo "📦 ${mode_text}开始推送到 Gitee..."
          
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/bettergi-scripts-tools.git"
          git remote remove gitee 2>/dev/null || true
          git remote add gitee "$GITEE_URL"
          
          echo "✓ Gitee remote 配置完成"
          echo ""
          
          echo "📦 推送主分支 (master)..."
          git push -f gitee master:master
          echo "✓ 主分支推送完成"
          echo ""
          
          echo "🏷️ 推送所有标签..."
          local_tag_count=$(git tag -l | wc -l)
          git push -f gitee --tags
          echo "✓ 标签推送完成（共 $local_tag_count 个）"

      - name: 同步 GitHub Releases 到 Gitee 发行版
        if: (steps.check_changes.outputs.has_changes == 'true' || steps.force_mode.outputs.force_mode == 'true') && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_USERNAME }}
          GITEE_REPO: bettergi-scripts-tools
        run: |
          mode_text=""
          [[ "${{ steps.force_mode.outputs.force_mode }}" == "true" ]] && mode_text="[强制推送模式] "
          
          echo "📦 ${mode_text}同步 GitHub Releases 到 Gitee..."
          
          # 使用 gh + Gitee API 同步 release 元数据
          gh release list --json tagName,title,body --jq '.[] | {tag: .tagName, name: .title, body: .body}' | while IFS= read -r rel_json; do
            tag=$(echo "$rel_json" | jq -r '.tag')
            name=$(echo "$rel_json" | jq -r '.name // .tag')
            body=$(echo "$rel_json" | jq -r '.body // ""' | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          
            echo "处理 Release: $tag ($name)"
          
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $GITEE_TOKEN" \
              "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$tag")
          
            payload="{\"tag_name\":\"$tag\",\"name\":\"$name\",\"body\":\"$body\",\"target_commitish\":\"$tag\"}"
          
            if [ "$http_code" = "200" ]; then
              echo "  已存在 → 更新"
              curl -s -X PATCH \
                -H "Authorization: token $GITEE_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$payload" \
                "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$tag" > /dev/null
            else
              echo "  不存在 → 创建"
              curl -s -X POST \
                -H "Authorization: token $GITEE_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$payload" \
                "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases" > /dev/null
            fi
          done
          
          echo "✓ Releases 元数据同步完成（附件暂未同步，如需可加逻辑）"

      - name: 验证同步结果
        if: steps.check_changes.outputs.has_changes == 'true' || steps.force_mode.outputs.force_mode == 'true'
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          mode_text=""
          [[ "${{ steps.force_mode.outputs.force_mode }}" == "true" ]] && mode_text="[强制推送模式] "
          
          echo "══════════════════════════════════════════"
          echo "${mode_text}Gitee 同步验证"
          echo "══════════════════════════════════════════"
          echo ""
          
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/bettergi-scripts-tools.git"
          
          echo "检查主分支 (master)..."
          if git ls-remote --heads "$GITEE_URL" master | grep -q 'refs/heads/master'; then
            echo "✅ 主分支已同步"
          else
            echo "❌ 主分支同步失败"
            exit 1
          fi
          echo ""
          
          echo "标签数量对比:"
          local_tags=$(git tag -l | wc -l)
          remote_tags=$(git ls-remote --tags "$GITEE_URL" 2>/dev/null | grep -v '\^{}' | wc -l)
          echo "  本地：$local_tags"
          echo "  远程：$remote_tags"
          
          if [ "$local_tags" -eq "$remote_tags" ]; then
            echo "✅ 标签数量一致"
          else
            echo "⚠️ 标签数量不一致（Gitee 可能有延迟）"
          fi
          echo ""
          echo "✓ 验证完成"

      - name: 输出总结
        if: always()
        run: |
          status_emoji="${{ job.status == 'success' && '✅' || '❌' }}"
          status_text="${{ job.status == 'success' && '成功' || '失败' }}"
          
          mode_text=""
          [[ "${{ steps.force_mode.outputs.force_mode }}" == "true" ]] && mode_text="[强制推送模式] "
          
          echo "======================================"
          echo "$status_emoji ${mode_text}Sync to Gitee $status_text"
          echo "======================================"
          echo "触发方式：${{ github.event_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "强制推送：${{ inputs.force_push }}"
          fi
          echo "提交 SHA: ${{ github.sha }}"
          echo "Gitee 地址：https://gitee.com/${{ secrets.GITEE_USERNAME }}/bettergi-scripts-tools"
          
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "false" ]; then
            echo "同步状态：⏭️ 已跳过（无变更）"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "同步状态：✅ 已完成"
          else
            echo "同步状态：❌ 失败"
            echo ""
            echo "可能的原因:"
            echo "  1. GITEE_TOKEN 权限不足或过期"
            echo "  2. Gitee 仓库不存在或受保护"
            echo "  3. 网络连接问题"
            echo "  4. 用户名或 Token 配置错误"
          fi
          echo "======================================"