api:
  #authorization: Authorization
  authorization: ${auth.token-name}
  common:
    version: 3.0.0
    title: SecuityAPI
    description: SecuityAPI
    termsOfService:
    license: 未经许可不得转载
    licenseUrl: xxx.license.com
    externalDocDesc:
    externalDocUrl:
    contact:
      name: kirito-asuna
      url:
      email:

springdoc:
  api-docs:
    path: /v3/api-docs
  # 请注意使用group名时如果配置了GroupedOpenApi引用自动配置时组名不能重复
  open:
    default-group-configs:
      enable: true
      api: true
      jwt: true
      other: true
  group-configs:
    - group: "api"
      paths-to-match: "/api/**"
    - group: "jwt"
      paths-to-match: "/jwt/**"
    - group: "other"
      paths-to-exclude:
        - "/swagger-resources/**"
        - "/v2/api-docs"
        - "/v3/api-docs"
        - "/api/**"
        - "/jwt/**"
  swagger-ui:
    operations-sorter: alpha
    path: /swagger-ui.html
    tags-sorter: alpha
#Authorization 在knife4j中失效==>替代方案 使用knife4j中全局参数设置Authorization
knife4j:
  cors: true
  enable: true
  setting:
    enable-dynamic-parameter: true
  #swagger
  basic:
    enable: false
    username: root
    password: root


server:
  servlet:
    context-path: /bgi
  port: 8081


spring:
  application:
    name: bgi-tools
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  config:
    import:
      - optional:file:./application-prod.yml
      - optional:file:/app/application-prod.yml #docker加载异常处理
  profiles:
    active: prod

      #mvc:
      # 推荐开启这个，让 /** 映射优先级低于静态资源
      #static-path-pattern: /static/ui/**   # 可选，如果你想把静态资源路径改成 /static/ 开头
      #throw-exception-if-no-handler-found: true   # 可选，404 时抛异常方便调试
      #web:
      #resources:
      #static-locations:
    #- classpath:/static/ui/
    # 默认已经包含 classpath:/static/，通常不需要额外配置
    # 如果你把 dist 放在其他位置，可以加
    # static-locations: classpath:/static/,classpath:/public/
  #redis
  redis:
    # Redisson 内嵌配置（关键部分）
    redisson:
      config: |
        # ────────────── 单机模式（single）示例 ──────────────
        singleServerConfig:
          # 解决超时问题（必须调大！）
          timeout: ${spring.redis.timeout:20000}                 # 命令超时 20s（默认 3s）
          connectTimeout: ${spring.redis.connectTimeout:15000}          # 连接超时 15s
          retryAttempts: ${spring.redis.retryAttempts:5}               # 重试 5 次
          retryInterval: ${spring.redis.retryInterval:3000}            # 重试间隔 3s

          # 连接池调优（高并发推荐）
          connectionPoolSize: 128
          connectionMinimumIdleSize: 32
          subscriptionConnectionPoolSize: 50
          subscriptionConnectionMinimumIdleSize: 10

          pingConnectionInterval: 30000  # 保活 ping 每 30s
          keepAlive: true
          tcpNoDelay: true

        # 全局参数（可选，放根级别）
        threads: 32                      # 业务线程数
        nettyThreads: 32                 # Netty IO 线程
        # codec: !<org.redisson.codec.JsonJacksonCodec> {}   # 换成 JSON 序列化（可选，默认 JDK）

        # 如果是集群模式，注释掉上面的 singleServerConfig，启用下面
        # clusterServersConfig:
        #   nodeAddresses:
        #     - "redis://node1:6379"
        #     - "redis://node2:6379"
        #     - "redis://node3:6379"
        #   password: ${spring.redis.password:}
        #   timeout: ${spring.redis.timeout:20000}                 # 命令超时 20s（默认 3s）
        #   connectTimeout: ${spring.redis.connectTimeout:15000}          # 连接超时 15s
        #   retryAttempts: ${spring.redis.retryAttempts:5}               # 重试 5 次
        #   retryInterval: ${spring.redis.retryInterval:3000}            # 重试间隔 3s
        #   checkSlotsInUse: false
        #   masterConnectionPoolSize: 128
        #   masterConnectionMinimumIdleSize: 32
        #   slaveConnectionPoolSize: 128
        #   slaveConnectionMinimumIdleSize: 32
        #   readMode: "SLAVE"

        # 如果是哨兵模式，注释掉上面，启用下面
        # sentinelServersConfig:
        #   masterName: mymaster
        #   sentinelAddresses:
        #     - "redis://sentinel1:26379"
        #     - "redis://sentinel2:26379"
        #   password: ${spring.redis.password:}
        #   password: ${spring.redis.password:}
        #   timeout: ${spring.redis.timeout:20000}                 # 命令超时 20s（默认 3s）
        #   connectTimeout: ${spring.redis.connectTimeout:15000}          # 连接超时 15s
        #   retryAttempts: ${spring.redis.retryAttempts:5}               # 重试 5 次
        #   retryInterval: ${spring.redis.retryInterval:3000}            # 重试间隔 3s
        #   masterConnectionPoolSize: 128
        #   masterConnectionMinimumIdleSize: 32

    mode: single # none:不使用redis，single:使用单体,cluster:使用集群，sentinel:使用哨兵
    #单体
    host: 127.0.0.1
    port: 6379
    database: 0
    timeout: 30000 #连接超时时间
    #哨兵
    sentinel:
      master: mymaster   # 哨兵 master-set 名称
      nodes:
        - 192.168.6.128:26379
        - 192.168.6.128:26380
    #集群
    cluster:
      nodes:
        - 192.168.6.128:7000
        - 192.168.6.128:7001
    #安全
    username:  #默认为空
    password:  #默认为空

#需要验证的接口设置token
check:
  token: #注意：其中一项为空时将不会校验
    name:  # token名称 默认为空
    value: # token值 默认为空
bgi-tools:
  version: 0.0.5
#设置默认账号密码
auth:
  enabled: true
  token-name: bgi_tools_token
  users:
    - username: bgi_tools
      password: bgi_tools

logging:
  level:
    com.cloud_guest.redis.service.impl: off
    com.cloud_guest.task.job: off
    com.cloud_guest.utils.ApplicationContextHolder: off
    com.cloud_guest.wrappers.lock: off
    com.cloud_guest: debug

management:
  endpoint:
    restart:
      enabled: true